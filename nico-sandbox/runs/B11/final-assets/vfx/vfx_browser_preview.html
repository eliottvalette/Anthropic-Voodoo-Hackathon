<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>B11 VFX Browser Preview</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>
    <style>
      :root {
        color-scheme: dark;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #151a14;
        color: #eaf2e6;
      }
      main {
        width: min(100vw, 460px);
        padding: 10px;
      }
      #toolbar {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
        margin-bottom: 8px;
      }
      #toolbar select, #toolbar button, #toolbar label {
        font-size: 12px;
      }
      #toolbar select, #toolbar button {
        background: #263124;
        color: #ecf3e8;
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 6px;
        padding: 6px 8px;
      }
      #toolbar button { cursor: pointer; }
      #game {
        width: 100%;
        aspect-ratio: 384 / 683;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.14);
      }
      .hint {
        margin-top: 8px;
        font-size: 12px;
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <main>
      <div id="toolbar">
        <select id="effect">
          <option value="fire_explosion_vfx">fire_explosion_vfx</option>
          <option value="poison_splash_vfx">poison_splash_vfx</option>
          <option value="pink_sparkle_vfx">pink_sparkle_vfx</option>
          <option value="ghost_vfx">ghost_vfx</option>
          <option value="rocket_smoke_trail">rocket_smoke_trail</option>
          <option value="fireball_smoke_trail">fireball_smoke_trail</option>
        </select>
        <button id="spawn">Spawn Center</button>
        <button id="clear">Clear</button>
        <label><input id="auto" type="checkbox" checked /> Auto loop</label>
      </div>
      <div id="game"></div>
      <div class="hint">Click/tap anywhere in the play area to spawn the selected VFX.</div>
    </main>

    <script>
      const W = 384;
      const H = 683;
      const groundY = 560;
      const controls = {
        effect: document.getElementById("effect"),
        auto: document.getElementById("auto"),
        spawn: document.getElementById("spawn"),
        clear: document.getElementById("clear"),
      };

      function circleTexture(scene, key, size, color = 0xffffff) {
        if (scene.textures.exists(key)) return;
        const g = scene.make.graphics({ x: 0, y: 0, add: false });
        g.fillStyle(color, 1);
        g.fillCircle(size / 2, size / 2, size / 2);
        g.generateTexture(key, size, size);
        g.destroy();
      }

      function starTexture(scene, key) {
        if (scene.textures.exists(key)) return;
        const g = scene.make.graphics({ x: 0, y: 0, add: false });
        g.fillStyle(0xffffff, 1);
        g.beginPath();
        const cx = 12;
        const cy = 12;
        for (let i = 0; i < 5; i++) {
          const outerA = Phaser.Math.DegToRad(-90 + i * 72);
          const innerA = Phaser.Math.DegToRad(-54 + i * 72);
          g.lineTo(cx + Math.cos(outerA) * 10, cy + Math.sin(outerA) * 10);
          g.lineTo(cx + Math.cos(innerA) * 4.2, cy + Math.sin(innerA) * 4.2);
        }
        g.closePath();
        g.fillPath();
        g.generateTexture(key, 24, 24);
        g.destroy();
      }

      function spawnFireExplosion(scene, x, y) {
        circleTexture(scene, "fx_dot", 16);
        const core = scene.add.particles(x, y, "fx_dot", {
          speed: { min: 80, max: 260 },
          lifespan: 420,
          scale: { start: 2.6, end: 0 },
          tint: [0xfff27a, 0xff8b2d, 0xff3d1a],
          blendMode: Phaser.BlendModes.ADD,
          quantity: 18,
          emitting: false,
        });
        const smoke = scene.add.particles(x, y, "fx_dot", {
          speed: { min: 20, max: 90 },
          lifespan: 1000,
          scale: { start: 1.1, end: 4.8 },
          alpha: { start: 0.45, end: 0 },
          tint: [0x232324, 0x343436],
          quantity: 14,
          emitting: false,
        });
        core.explode();
        smoke.explode();
        scene.time.delayedCall(1100, () => { core.destroy(); smoke.destroy(); });
      }

      function spawnPoisonSplash(scene, x, y) {
        circleTexture(scene, "poison_dot", 16);
        const liquid = scene.add.particles(x, y, "poison_dot", {
          speed: { min: 140, max: 370 },
          angle: { min: 190, max: 350 },
          gravityY: 780,
          lifespan: 700,
          scale: { start: 0.45, end: 0 },
          tint: [0x64ff62, 0x34cf4b],
          quantity: 22,
          emitting: false,
        });
        const gas = scene.add.particles(x, y, "poison_dot", {
          speed: { min: 30, max: 90 },
          angle: { min: 200, max: 340 },
          lifespan: 1400,
          scale: { start: 0.7, end: 3.2 },
          alpha: { start: 0.55, end: 0 },
          tint: [0x4be064, 0x2b8c41],
          blendMode: Phaser.BlendModes.SCREEN,
          quantity: 14,
          emitting: false,
        });
        liquid.explode();
        gas.explode();
        scene.time.delayedCall(1500, () => { liquid.destroy(); gas.destroy(); });
      }

      function spawnPinkSparkle(scene, x, y) {
        starTexture(scene, "sparkle_star");
        const burst = scene.add.particles(x, y, "sparkle_star", {
          speed: { min: 140, max: 440 },
          angle: { min: 0, max: 360 },
          lifespan: 650,
          scale: { start: 0.5, end: 0 },
          alpha: { start: 1, end: 0 },
          rotate: { min: 0, max: 360 },
          tint: [0xff00ff, 0xff8fd8, 0xffffff],
          blendMode: Phaser.BlendModes.ADD,
          quantity: 44,
          emitting: false,
        });
        burst.explode();
        scene.time.delayedCall(700, () => burst.destroy());
      }

      function spawnGhost(scene, x, y) {
        circleTexture(scene, "ghost_smoke", 24, 0xffffff);
        const body = scene.add.ellipse(x, y, 72, 104, 0xbce6ff, 0.56);
        const eyes = scene.add.ellipse(x - 14, y - 10, 10, 16, 0x101418, 0.85);
        const eye2 = scene.add.ellipse(x + 14, y - 10, 10, 16, 0x101418, 0.85);
        const mouth = scene.add.ellipse(x, y + 20, 16, 22, 0x101418, 0.75);
        const smoke = scene.add.particles(x, y + 10, "ghost_smoke", {
          speed: { min: 16, max: 46 },
          lifespan: 1200,
          scale: { start: 0.4, end: 1.6 },
          alpha: { start: 0.32, end: 0 },
          tint: [0x9dc3d5, 0x7d9ca9],
          frequency: 90,
          quantity: 1,
          blendMode: Phaser.BlendModes.NORMAL,
        });
        scene.tweens.add({
          targets: [body, eyes, eye2, mouth, smoke],
          y: "-=22",
          duration: 1200,
          yoyo: true,
          repeat: 2,
          ease: "Sine.easeInOut",
        });
        scene.time.delayedCall(3200, () => {
          smoke.stop();
          scene.tweens.add({
            targets: [body, eyes, eye2, mouth],
            alpha: 0,
            duration: 450,
            onComplete: () => {
              smoke.destroy(); body.destroy(); eyes.destroy(); eye2.destroy(); mouth.destroy();
            },
          });
        });
      }

      function spawnSmokeTrail(scene, x, y, tintSet) {
        circleTexture(scene, "trail_dot", 24);
        const p = scene.add.circle(x, y, 7, 0xffe8cb, 0.9);
        const vx = Phaser.Math.Between(220, 300);
        const vy = Phaser.Math.Between(-120, -40);
        scene.tweens.add({
          targets: p,
          x: x + vx * 1.3 / 60 * 60,
          y: y + vy * 1.3 / 60 * 60,
          duration: 1300,
          ease: "Sine.easeOut",
          onComplete: () => p.destroy(),
        });
        const trail = scene.add.particles(0, 0, "trail_dot", {
          follow: p,
          lifespan: 1100,
          speed: { min: 5, max: 20 },
          angle: { min: 0, max: 360 },
          scale: { start: 0.34, end: 1.6 },
          alpha: { start: 0.85, end: 0 },
          tint: tintSet,
          frequency: 55,
          quantity: 1,
        });
        scene.time.delayedCall(1450, () => {
          trail.stop();
          scene.time.delayedCall(1200, () => trail.destroy());
        });
      }

      class VfxPreviewScene extends Phaser.Scene {
        preload() {
          this.load.image("bg", "../backgrounds/background_plate.png");
        }

        create() {
          this.add.image(W / 2, H / 2, "bg").setDisplaySize(W, H);
          this.effects = {
            fire_explosion_vfx: (x, y) => spawnFireExplosion(this, x, y),
            poison_splash_vfx: (x, y) => spawnPoisonSplash(this, x, y),
            pink_sparkle_vfx: (x, y) => spawnPinkSparkle(this, x, y),
            ghost_vfx: (x, y) => spawnGhost(this, x, y),
            rocket_smoke_trail: (x, y) => spawnSmokeTrail(this, x, y, [0xd9d9d9, 0x8a8a8a, 0xc8b9a7]),
            fireball_smoke_trail: (x, y) => spawnSmokeTrail(this, x, y, [0xd29b6c, 0xb07d50, 0xf4d1a6]),
          };

          this.input.on("pointerdown", (pointer) => this.spawn(pointer.x, pointer.y));
          controls.spawn.addEventListener("click", () => this.spawn(W / 2, groundY - 90));
          controls.clear.addEventListener("click", () => this.scene.restart());

          this.autoTimer = this.time.addEvent({
            delay: 1200,
            loop: true,
            callback: () => {
              if (!controls.auto.checked) return;
              this.spawn(Phaser.Math.Between(120, 264), Phaser.Math.Between(360, 540));
            },
          });

          this.spawn(W / 2, groundY - 90);
        }

        spawn(x, y) {
          const key = controls.effect.value;
          const fn = this.effects[key];
          if (fn) fn(x, y);
        }
      }

      new Phaser.Game({
        type: Phaser.AUTO,
        parent: "game",
        width: W,
        height: H,
        backgroundColor: "#192218",
        scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
        scene: VfxPreviewScene,
      });
    </script>
  </body>
</html>
