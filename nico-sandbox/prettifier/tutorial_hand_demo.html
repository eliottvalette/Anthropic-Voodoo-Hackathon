<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>B11 Tutorial Hand Animation Demo</title>
<style>
  html,
  body {
    margin: 0;
    min-height: 100%;
    background: #16110d;
    color: #f8efe1;
    font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  body {
    display: grid;
    min-height: 100vh;
    place-items: center;
  }

  .demo-shell {
    display: grid;
    gap: 14px;
    padding: 18px;
  }

  .game-stage {
    position: relative;
    width: min(384px, calc(100vw - 28px));
    aspect-ratio: 384 / 683;
    overflow: hidden;
    border: 1px solid rgba(255, 244, 219, .22);
    background: #4d6f7a;
    box-shadow: 0 18px 42px rgba(0, 0, 0, .42);
  }

  .game-stage img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
    user-select: none;
    -webkit-user-drag: none;
  }

  .controls {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 8px;
  }

  button {
    min-height: 38px;
    border: 1px solid rgba(255, 244, 219, .28);
    border-radius: 7px;
    background: #2b2119;
    color: #f8efe1;
    font-weight: 800;
    cursor: pointer;
  }

  button:hover {
    background: #3a2a1f;
  }
</style>
</head>
<body>
  <main class="demo-shell">
    <div id="game-stage" class="game-stage">
      <img src="../runs/B11/final-assets-v1/backgrounds/bg_gameplay.png" alt="" />
    </div>
    <div class="controls" aria-label="Tutorial animation examples">
      <button type="button" data-demo="swipe">Swipe</button>
      <button type="button" data-demo="drag">Drag</button>
      <button type="button" data-demo="click">Click</button>
    </div>
  </main>

  <script src="tutorial_hand_animation.js"></script>
  <script>
    (function initDemo() {
      "use strict";

      var stage = document.getElementById("game-stage");
      var active = null;
      var shared = {
        container: stage,
        coordinateSize: { width: 384, height: 683 },
        handSrc: "../runs/B11/final-assets-v1/ui/ui_hand_cursor.png",
        fit: "contain",
        handSize: 50,
        handAspect: 1.3,
      };

      var demos = {
        swipe: {
          mode: "swipe",
          from: { x: 82, y: 528 },
          to: { x: 248, y: 392 },
          duration: 1300
        },
        drag: {
          mode: "drag",
          from: { x: 302, y: 540 },
          to: { x: 168, y: 455 },
          duration: 1500
        },
        click: {
          mode: "click",
          at: { x: 190, y: 560 },
          duration: 1800
        }
      };

      function run(name) {
        if (active) active.remove();
        active = TutorialHand.show(Object.assign({}, shared, demos[name]));
      }

      document.querySelectorAll("[data-demo]").forEach(function attach(button) {
        button.addEventListener("click", function onClick() {
          run(button.getAttribute("data-demo"));
        });
      });

      var requestedMode = new URLSearchParams(window.location.search).get("mode");
      run(demos[requestedMode] ? requestedMode : "swipe");
      window.demoTutorialHand = run;
    })();
  </script>
</body>
</html>
