<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>hp-segmented demo</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:linear-gradient(180deg,#bfe3ff,#e8f4ff);display:flex;align-items:center;justify-content:center;font-family:Arial}
  canvas{background:transparent;cursor:pointer}
</style>
</head>
<body>

<canvas id="c" width="360" height="260"></canvas>
<script src="../hp-segmented.js"></script>
<script>
const cv = document.getElementById('c');
const ctx = cv.getContext('2d');
let hp3 = 3, hp5 = 5, hp10 = 10;

cv.addEventListener('pointerdown', () => {
  hp3 = hp3 > 0 ? hp3 - 1 : 3;
  hp5 = hp5 > 0 ? hp5 - 1 : 5;
  hp10 = hp10 > 0 ? hp10 - 1 : 10;
  draw();
});

function draw() {
  ctx.clearRect(0,0,cv.width,cv.height);
  ctx.fillStyle = '#0F141C';
  ctx.font = '900 14px Arial';
  ctx.textAlign = 'left';

  ctx.fillText('3 HP (hearts):', 20, 22);
  drawHpSegmented(ctx, 20, 36, { current: hp3, max: 3, segWidth: 50, segHeight: 18, color: '#ef4444' });

  ctx.fillText('5 HP (chunks):', 20, 110);
  drawHpSegmented(ctx, 20, 124, { current: hp5, max: 5, segWidth: 28, segHeight: 18, color: '#22c55e' });

  ctx.fillText('10 HP (slim):', 20, 200);
  drawHpSegmented(ctx, 20, 214, { current: hp10, max: 10, segWidth: 14, segHeight: 18, gap: 2, color: '#f59e0b' });
}
draw();
</script>
</body>
</html>
