<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>ripple demo</title>
    <style>
        html,
        body {
            margin: 0;
            height: 100%;
            overflow: hidden;
            background: #F6F9FC;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial
        }

        canvas {
            background: #0F141C;
            border-radius: 8px;
            touch-action: none
        }
    </style>
</head>

<body>

    <canvas id="c" width="360" height="640"></canvas>
    <script src="../ripple.js"></script>
    <script>
        const cv = document.getElementById('c');
        const ctx = cv.getContext('2d');
        const ripples = [];
        const palette = [
            { color: '#7ef3ff', max: 110 }, // water
            { color: '#ffd84a', max: 130 }, // sonar
            { color: '#ff8be0', max: 95 }, // ability ring
        ];
        let last = 0;

        cv.addEventListener('pointerdown', e => {
            const r = cv.getBoundingClientRect();
            const x = (e.clientX - r.left) * cv.width / r.width;
            const y = (e.clientY - r.top) * cv.height / r.height;
            const p = palette[Math.floor(Math.random() * palette.length)];
            spawnRipple(ripples, x, y, { color: p.color, maxRadius: p.max, ringCount: 4, gap: 130, life: 750 });
        });

        let auto = 0;
        function loop(now) {
            const dt = last ? Math.min(34, now - last) : 16;
            last = now; auto += dt;
            if (auto > 1100) {
                const p = palette[Math.floor(Math.random() * palette.length)];
                spawnRipple(ripples, 60 + Math.random() * 240, 200 + Math.random() * 280,
                    { color: p.color, maxRadius: p.max, ringCount: 3, gap: 150, life: 720 });
                auto = 0;
            }
            updateRipples(ripples, dt);
            ctx.clearRect(0, 0, cv.width, cv.height);
            // floor shading so the squash reads as "ground"
            const grad = ctx.createLinearGradient(0, 200, 0, 640);
            grad.addColorStop(0, '#0F141C');
            grad.addColorStop(1, '#172033');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 200, cv.width, 440);
            drawRipples(ctx, ripples);
            requestAnimationFrame(loop);
        }
        requestAnimationFrame(loop);
    </script>
</body>

</html>
