<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>glow-pulse demo</title>
    <style>
        html,
        body {
            margin: 0;
            height: 100%;
            overflow: hidden;
            background: #F6F9FC;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial
        }

        canvas {
            background: #0F141C;
            border-radius: 8px;
            touch-action: none
        }
    </style>
</head>

<body>

    <canvas id="c" width="360" height="640"></canvas>
    <script src="../glow-pulse.js"></script>
    <script>
        const cv = document.getElementById('c');
        const ctx = cv.getContext('2d');
        const pulses = [];
        const palette = ['#7ef3ff', '#ffd84a', '#ff8be0', '#a4ff7a', '#ff7a7a'];
        let last = 0, t = 0;

        const orb = { x: 180, y: 320 };

        cv.addEventListener('pointerdown', e => {
            const r = cv.getBoundingClientRect();
            const x = (e.clientX - r.left) * cv.width / r.width;
            const y = (e.clientY - r.top) * cv.height / r.height;
            spawnGlowPulse(pulses, x, y, {
                color: palette[Math.floor(Math.random() * palette.length)],
                radius: 95, life: 700, count: 3, gap: 200,
            });
        });

        let auto = 0;
        function loop(now) {
            const dt = last ? Math.min(34, now - last) : 16;
            last = now; t += dt; auto += dt;

            // Continuous aura around moving orb (uses tracks: orb)
            if (auto > 600) {
                spawnGlowPulse(pulses, orb.x, orb.y, {
                    color: palette[Math.floor(t / 2000) % palette.length],
                    radius: 75, life: 1100, peakAlpha: 0.55, tracks: orb,
                });
                auto = 0;
            }
            orb.x = 180 + Math.cos(t / 800) * 90;
            orb.y = 320 + Math.sin(t / 600) * 110;

            updateGlowPulses(pulses, dt);
            ctx.clearRect(0, 0, cv.width, cv.height);
            drawGlowPulses(ctx, pulses);
            // Solid orb at the center of the aura
            ctx.fillStyle = '#ffffff';
            ctx.beginPath(); ctx.arc(orb.x, orb.y, 6, 0, Math.PI * 2); ctx.fill();
            requestAnimationFrame(loop);
        }
        requestAnimationFrame(loop);
    </script>
</body>

</html>
