<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>slash demo</title>
    <style>
        html,
        body {
            margin: 0;
            height: 100%;
            overflow: hidden;
            background: #F6F9FC;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial
        }

        canvas {
            background: #0F141C;
            border-radius: 8px;
            touch-action: none
        }
    </style>
</head>

<body>

    <canvas id="c" width="360" height="640"></canvas>
    <script src="../slash.js"></script>
    <script>
        const cv = document.getElementById('c');
        const ctx = cv.getContext('2d');
        const slashes = [];
        const palette = ['#ffd84a', '#7ef3ff', '#ff8be0', '#a4ff7a'];
        let last = 0;

        function strike(cx, cy) {
            // Random angle and direction; ~120deg sweep.
            const base = Math.random() * Math.PI * 2;
            const dir = Math.random() < 0.5 ? 1 : -1;
            const arc = 1.7 + Math.random() * 0.6;
            const c = palette[Math.floor(Math.random() * palette.length)];
            spawnSlash(slashes, cx, cy, base, base + arc * dir, {
                radius: 50,
                thickness: 9,
                glowColor: c,
                life: 280,
            });
        }

        cv.addEventListener('pointerdown', e => {
            const r = cv.getBoundingClientRect();
            strike((e.clientX - r.left) * cv.width / r.width, (e.clientY - r.top) * cv.height / r.height);
        });

        let auto = 0;
        function loop(now) {
            const dt = last ? Math.min(34, now - last) : 16;
            last = now; auto += dt;
            if (auto > 480) {
                strike(180 + (Math.random() - 0.5) * 200, 320 + (Math.random() - 0.5) * 320);
                auto = 0;
            }
            updateSlashes(slashes, dt);
            ctx.clearRect(0, 0, cv.width, cv.height);
            // Faint target reticle
            ctx.strokeStyle = 'rgba(255,255,255,0.08)';
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.arc(180, 320, 60, 0, Math.PI * 2); ctx.stroke();
            drawSlashes(ctx, slashes);
            requestAnimationFrame(loop);
        }
        requestAnimationFrame(loop);
    </script>
</body>

</html>
