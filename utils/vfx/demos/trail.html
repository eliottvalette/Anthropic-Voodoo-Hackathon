<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>trail demo</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#F6F9FC;display:flex;align-items:center;justify-content:center;font-family:Arial}
  canvas{background:#0F141C;border-radius:8px;touch-action:none}
</style>
</head>
<body>
<canvas id="c" width="360" height="640"></canvas>
<script src="../particles.js"></script>
<script src="../trail.js"></script>
<script>
const cv = document.getElementById('c');
const ctx = cv.getContext('2d');
const particles = [];
let last = 0;
let t = 0;

function loop(now) {
  const dt = last ? Math.min(34, now - last) : 16;
  last = now;
  t += dt / 1000;

  // Two orbiting projectiles emit trails
  const pa = { x: 180 + Math.cos(t*1.3) * 130, y: 320 + Math.sin(t*1.3) * 200 };
  const pb = { x: 180 + Math.cos(t*0.9 + Math.PI) * 110, y: 320 + Math.sin(t*0.9 + Math.PI) * 160 };
  spawnTrail(particles, pa.x, pa.y, '#27a8ff', 2, 5);
  spawnTrail(particles, pb.x, pb.y, '#ff8a27', 2, 5);

  updateParticles(particles, dt);
  ctx.clearRect(0,0,cv.width,cv.height);
  drawParticles(ctx, particles);

  // The projectile heads
  ctx.fillStyle = '#27a8ff';
  ctx.beginPath(); ctx.arc(pa.x, pa.y, 7, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#ff8a27';
  ctx.beginPath(); ctx.arc(pb.x, pb.y, 7, 0, Math.PI*2); ctx.fill();

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
