<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>shockwave demo</title>
  <style>
    html,
    body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #F6F9FC;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial
    }

    canvas {
      background: #0F141C;
      border-radius: 8px;
      touch-action: none
    }
  </style>
</head>

<body>

  <canvas id="c" width="360" height="640"></canvas>
  <script src="../shockwave.js"></script>
  <script>
    const cv = document.getElementById('c');
    const ctx = cv.getContext('2d');
    const waves = [];
    const colors = ['#ffffff', '#ffbf31', '#ff4141', '#27a8ff', '#e93cff'];
    let last = 0;

    function trigger(x, y) {
      const c = colors[Math.floor(Math.random() * colors.length)];
      spawnShockwave(waves, x, y, c, 130, 600, 7);
      spawnShockwave(waves, x, y, c, 80, 400, 4);
    }

    cv.addEventListener('pointerdown', e => {
      const r = cv.getBoundingClientRect();
      trigger((e.clientX - r.left) * cv.width / r.width, (e.clientY - r.top) * cv.height / r.height);
    });

    let auto = 0;
    function loop(now) {
      const dt = last ? Math.min(34, now - last) : 16;
      last = now;
      auto += dt;
      if (auto > 900) { trigger(180, 320); auto = 0; }
      updateShockwaves(waves, dt);
      ctx.clearRect(0, 0, cv.width, cv.height);
      drawShockwaves(ctx, waves);
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  </script>
</body>

</html>
