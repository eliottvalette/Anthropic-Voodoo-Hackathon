<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>game-over-effect demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
    <style>
        html,
        body {
            margin: 0;
            height: 100%;
            overflow: hidden;
            background: #F6F9FC;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial
        }

        canvas {
            background: linear-gradient(160deg, #7da45c, #9fb978);
            border-radius: 8px;
            cursor: pointer;
            touch-action: none
        }
    </style>
</head>

<body>
    <canvas id="c" width="360" height="640"></canvas>
    <script src="../game-over-effect.js"></script>
    <script src="../game-lost.js"></script>
    <script>
        const cv = document.getElementById('c');
        const ctx = cv.getContext('2d');
        const W = cv.width, H = cv.height;

        const variants = [
            { headline: "GAME OVER", subhead: "TAP TO RETRY" },
            { headline: "DEFEATED", subhead: null },
            { headline: "YOU LOST", subhead: "TRY AGAIN" },
            { headline: "FAILED", subhead: "ALMOST THERE" },
        ];
        let vi = 0;
        let fx = createGameOverEffect({ W, H, ...variants[0] });

        // A more colorful scene helps the desaturate effect read clearly.
        function paintScene() {
            // sky
            ctx.fillStyle = "#7ec8ff";
            ctx.fillRect(0, 0, W, H * 0.65);
            // hills
            ctx.fillStyle = "#3b8a3b";
            ctx.beginPath();
            ctx.moveTo(0, H * 0.55);
            ctx.quadraticCurveTo(W * 0.25, H * 0.45, W * 0.5, H * 0.55);
            ctx.quadraticCurveTo(W * 0.75, H * 0.65, W, H * 0.50);
            ctx.lineTo(W, H);
            ctx.lineTo(0, H);
            ctx.closePath();
            ctx.fill();
            // castle
            ctx.fillStyle = "#c81e2c";
            ctx.beginPath();
            ctx.moveTo(40, 380); ctx.lineTo(70, 340); ctx.lineTo(100, 380);
            ctx.lineTo(130, 340); ctx.lineTo(160, 380); ctx.lineTo(190, 340); ctx.lineTo(220, 380);
            ctx.lineTo(220, 540); ctx.lineTo(40, 540); ctx.closePath();
            ctx.fill();
            // door
            ctx.fillStyle = "#27a8ff";
            ctx.fillRect(115, 460, 30, 80);
            // sun
            ctx.fillStyle = "#ffd028";
            ctx.beginPath();
            ctx.arc(W * 0.78, H * 0.20, 28, 0, Math.PI * 2);
            ctx.fill();
        }

        let last = 0;
        let postSettle = 0;
        let endScreenShown = 0;
        function loop(now) {
            const dt = last ? Math.min(34, now - last) : 16;
            last = now;
            fx.update(dt);

            ctx.clearRect(0, 0, W, H);
            // Apply shake offset to the underlying scene only — the effect overlay stays steady.
            ctx.save();
            ctx.translate(fx.shakeX, fx.shakeY);
            paintScene();
            ctx.restore();
            fx.draw(ctx);

            if (fx.done) {
                postSettle += dt / 1000;
                endScreenShown += dt / 1000;
                if (postSettle > 0.30) {
                    const a = Math.min(1, (postSettle - 0.30) / 0.40);
                    ctx.save();
                    ctx.globalAlpha = a;
                    drawGameLost(ctx, W, H, {
                        primary: "BATTLE",
                        secondary: "FAILED",
                        cta: "TRY AGAIN",
                    });
                    ctx.restore();
                }
                if (endScreenShown > 2.4) {
                    vi = (vi + 1) % variants.length;
                    fx = createGameOverEffect({ W, H, ...variants[vi] });
                    postSettle = 0;
                    endScreenShown = 0;
                }
            }
            requestAnimationFrame(loop);
        }

        cv.addEventListener('pointerdown', () => {
            vi = (vi + 1) % variants.length;
            fx = createGameOverEffect({ W, H, ...variants[vi] });
            postSettle = 0;
            endScreenShown = 0;
        });

        document.fonts.ready.then(() => requestAnimationFrame(loop));
    </script>
</body>

</html>
