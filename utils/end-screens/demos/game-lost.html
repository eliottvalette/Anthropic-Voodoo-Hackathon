<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>game-lost demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#F6F9FC;display:flex;align-items:center;justify-content:center;font-family:Arial}
  canvas{background:linear-gradient(160deg,#7da45c,#9fb978);border-radius:8px;cursor:pointer;touch-action:none}
</style>
</head>
<body>
<canvas id="c" width="360" height="640"></canvas>
<script src="../game-lost.js"></script>
<script>
const cv = document.getElementById('c');
const ctx = cv.getContext('2d');
const variants = [
  { primary: "BATTLE", secondary: "FAILED", rewards: [
    { label: "-22.78", color: "#f5c842", kind: "trophy" },
    { label: "90", color: "#f5c842", kind: "coin" },
    { label: "13", color: "#a06d3a", kind: "wood" },
  ]},
  { primary: "GAME", secondary: "OVER" },
  { primary: "ENEMIES", secondary: "WIN", rewards: [
    { label: "-12", color: "#f5c842", kind: "trophy" },
    { label: "45", color: "#f5c842", kind: "coin" },
  ]},
];
let i = 0;

function paintScene() {
  ctx.clearRect(0,0,cv.width,cv.height);
  // fake castle silhouette
  ctx.fillStyle = '#0F141C';
  ctx.beginPath();
  ctx.moveTo(40,180); ctx.lineTo(70,140); ctx.lineTo(100,180);
  ctx.lineTo(130,140); ctx.lineTo(160,180); ctx.lineTo(190,140); ctx.lineTo(220,180);
  ctx.lineTo(220,440); ctx.lineTo(40,440); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#27a8ff';
  ctx.fillRect(70,260,40,60);
  // ground
  ctx.fillStyle = 'rgba(0,0,0,0.20)';
  ctx.fillRect(0, 480, cv.width, cv.height-480);
}

function draw() {
  paintScene();
  drawGameLost(ctx, cv.width, cv.height, variants[i]);
}

document.fonts.ready.then(draw);
draw();
setInterval(() => { i = (i+1) % variants.length; draw(); }, 2200);

cv.addEventListener('pointerdown', e => {
  const r = cv.getBoundingClientRect();
  const x = (e.clientX - r.left) * cv.width / r.width;
  const y = (e.clientY - r.top) * cv.height / r.height;
  if (isPointInCta(drawGameLost.lastCtaBounds, x, y)) {
    i = (i+1) % variants.length;
    draw();
  }
});
</script>
</body>
</html>
