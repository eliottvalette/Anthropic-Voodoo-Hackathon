<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Airplane Evolution — PoC</title>
<style>
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#0e1320;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;-webkit-tap-highlight-color:transparent}
  canvas{display:block;width:100%;height:100%;touch-action:none}
  #ui{position:fixed;inset:0;pointer-events:none;display:flex;flex-direction:column;justify-content:space-between;padding:14px}
  #ui .row{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .hud{pointer-events:auto;background:rgba(15,20,28,.72);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:10px 12px}
  #attempt{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#9aa3b2}
  #attempt b{color:#fff;font-weight:700}
  #distance{font-variant-numeric:tabular-nums;font-weight:700;font-size:18px;color:#fff}
  #best{font-size:11px;color:#0055FF;font-weight:600;letter-spacing:.06em}
  #parts{pointer-events:auto;display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
  .part{position:relative;background:rgba(15,20,28,.78);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:10px 12px;min-width:80px;text-align:center;cursor:pointer;transition:all .15s ease;user-select:none}
  .part:active{transform:scale(.97)}
  .part .lbl{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#9aa3b2;margin-bottom:4px}
  .part .val{font-size:13px;font-weight:600}
  .part.on{background:rgba(0,85,255,.18);border-color:#0055FF}
  .part.on .lbl{color:#7aa9ff}
  .part.on .val{color:#fff}
  .part.locked{opacity:.4;cursor:not-allowed}
  .part .tag{position:absolute;top:-6px;right:-6px;background:#0055FF;color:#fff;font-size:9px;font-weight:700;padding:2px 5px;border-radius:6px;letter-spacing:.04em}
  #hint{pointer-events:none;text-align:center;font-size:13px;color:rgba(255,255,255,.78);text-shadow:0 1px 4px rgba(0,0,0,.6);letter-spacing:.04em;margin:0 auto;padding:8px 14px;background:rgba(15,20,28,.55);backdrop-filter:blur(6px);border-radius:10px;width:max-content;max-width:90%}
  #hint.hidden{opacity:0;transition:opacity .25s ease}
  #toast{position:fixed;left:50%;top:30%;transform:translate(-50%,-50%);background:rgba(15,20,28,.92);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:18px 22px;text-align:center;opacity:0;pointer-events:none;transition:opacity .25s ease;max-width:300px}
  #toast.show{opacity:1}
  #toast .h{font-size:18px;font-weight:700;margin-bottom:4px}
  #toast .s{font-size:13px;color:#9aa3b2}
  .group{display:flex;flex-direction:column;gap:8px;align-items:flex-end}
  .group.left{align-items:flex-start}
  .center-col{display:flex;flex-direction:column;gap:10px;align-items:center;width:100%}
  #drag-overlay{position:fixed;inset:0;pointer-events:none;z-index:5}
  #drag-overlay svg{position:absolute;inset:0;width:100%;height:100%}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="drag-overlay"><svg><line id="drag-line" x1="0" y1="0" x2="0" y2="0" stroke="#0055FF" stroke-width="3" stroke-linecap="round" stroke-dasharray="6 6" opacity="0"/><circle id="drag-end" cx="0" cy="0" r="8" fill="#0055FF" opacity="0"/></svg></div>

<div id="ui">
  <div class="row">
    <div class="group left">
      <div class="hud" id="attempt">attempt <b id="att-num">1</b></div>
    </div>
    <div class="group">
      <div class="hud"><div id="distance">0 m</div><div id="best">best 0 m</div></div>
    </div>
  </div>

  <div class="center-col">
    <div id="parts">
      <div class="part on locked" data-id="fuselage"><span class="tag">core</span><div class="lbl">Fuselage</div><div class="val">paper body</div></div>
      <div class="part" data-id="wing_l"><div class="lbl">Wing L</div><div class="val">+lift</div></div>
      <div class="part" data-id="wing_r"><div class="lbl">Wing R</div><div class="val">+lift</div></div>
      <div class="part" data-id="tail"><div class="lbl">Tail</div><div class="val">+stab</div></div>
    </div>
    <div id="hint">drag back &amp; release to throw</div>
  </div>
</div>

<div id="toast"><div class="h" id="toast-h">Crashed</div><div class="s" id="toast-s">Add a part and try again</div></div>

<!-- INJECT_THREE -->

<script>
(()=>{
  // ── Helpers ───────────────────────────────────────────────────────────
  function buildCanvasTexture(w,h,draw){const cv=document.createElement('canvas');cv.width=w;cv.height=h;const ctx=cv.getContext('2d');ctx.clearRect(0,0,w,h);draw(ctx);const tex=new THREE.CanvasTexture(cv);tex.needsUpdate=true;return tex}
  function mulberry32(s){return function(){s=(s+0x6d2b79f5)|0;let t=Math.imul(s^(s>>>15),1|s);t=(t+Math.imul(t^(t>>>7),61|t))^t;return((t^(t>>>14))>>>0)/4294967296}}
  const lerp=(a,b,t)=>a+(b-a)*t;
  const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));

  // ── Renderer ──────────────────────────────────────────────────────────
  const canvas=document.getElementById('c');
  const renderer=new THREE.WebGLRenderer({canvas,antialias:true,powerPreference:'high-performance'});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio||1,2));
  renderer.outputColorSpace=THREE.SRGBColorSpace;
  renderer.shadowMap.enabled=true;
  renderer.shadowMap.type=THREE.PCFSoftShadowMap;

  const scene=new THREE.Scene();
  scene.background=new THREE.Color('#9bd3ff');
  scene.fog=new THREE.Fog('#9bd3ff',150,650);

  const camera=new THREE.PerspectiveCamera(58,1,0.1,1000);

  function resize(){const w=window.innerWidth,h=window.innerHeight;renderer.setSize(w,h,false);camera.aspect=w/h;camera.updateProjectionMatrix()}
  window.addEventListener('resize',resize);resize();

  // ── Lighting ──────────────────────────────────────────────────────────
  scene.add(new THREE.AmbientLight(0xffffff,0.55));
  const sun=new THREE.DirectionalLight(0xfff1d8,1.1);
  sun.position.set(60,90,40);sun.castShadow=true;
  sun.shadow.mapSize.set(1024,1024);
  const sd=sun.shadow.camera;sd.left=-100;sd.right=100;sd.top=100;sd.bottom=-100;sd.near=10;sd.far=260;
  sun.shadow.bias=-0.0008;
  scene.add(sun);

  // ── Terrain ───────────────────────────────────────────────────────────
  const TERRAIN_SIZE=1200;
  function buildTerrain(){
    const RES=120;
    const geo=new THREE.PlaneGeometry(TERRAIN_SIZE,TERRAIN_SIZE,RES,RES);
    geo.rotateX(-Math.PI/2);
    const pos=geo.attributes.position;
    const col=new Float32Array(pos.count*3);
    const rng=mulberry32(7);
    for(let i=0;i<pos.count;i++){
      const x=pos.getX(i),z=pos.getZ(i);
      const dist=Math.hypot(x,z);
      const h=Math.sin(x*0.04)*Math.cos(z*0.04)*1.4 + Math.sin(x*0.11+z*0.08)*0.6 + (dist>200?(dist-200)*0.05:0);
      pos.setY(i,h+(rng()-0.5)*0.18);
      const t=clamp((rng()-.5)*.18+.5,0,1);
      // grass mix: lighter & more varied
      const r=lerp(0.36,0.50,t),g=lerp(0.58,0.74,t),b=lerp(0.22,0.30,t);
      col[i*3]=r;col[i*3+1]=g;col[i*3+2]=b;
    }
    geo.setAttribute('color',new THREE.BufferAttribute(col,3));
    geo.computeVertexNormals();
    const mat=new THREE.MeshLambertMaterial({vertexColors:true,flatShading:true});
    const mesh=new THREE.Mesh(geo,mat);
    mesh.receiveShadow=true;
    return mesh;
  }
  scene.add(buildTerrain());

  // Distance markers (along +X axis, the flight path)
  function addDistanceMarker(d){
    const tex=buildCanvasTexture(256,128,c=>{c.fillStyle='rgba(15,20,28,.85)';c.fillRect(0,0,256,128);c.fillStyle='#fff';c.font='bold 64px sans-serif';c.textAlign='center';c.textBaseline='middle';c.fillText(d+' m',128,64)});
    const mat=new THREE.MeshBasicMaterial({map:tex,transparent:true,depthWrite:false,side:THREE.DoubleSide});
    const m=new THREE.Mesh(new THREE.PlaneGeometry(6,3),mat);
    m.position.set(d,5,0);scene.add(m);
    const pole=new THREE.Mesh(new THREE.BoxGeometry(0.2,4.5,0.2),new THREE.MeshLambertMaterial({color:0x2a2f3a}));
    pole.position.set(d,2.25,0);scene.add(pole);
  }
  for(const d of [25,50,100,200,400,800]) addDistanceMarker(d);

  // ── Trees (instanced for perf) ────────────────────────────────────────
  // Two instanced meshes: trunks (cylinder) + foliage (cone). 220 trees scattered
  // in an annulus around the launch path so the player sees them whoosh by.
  function scatterTrees(){
    const COUNT=220;
    const trunkGeo=new THREE.CylinderGeometry(0.18,0.26,1.6,5);
    trunkGeo.translate(0,0.8,0);
    const trunkMat=new THREE.MeshLambertMaterial({color:0x5a3a22});
    const trunkInst=new THREE.InstancedMesh(trunkGeo,trunkMat,COUNT);
    trunkInst.castShadow=true;trunkInst.receiveShadow=false;

    const leafGeo=new THREE.ConeGeometry(1.4,3.0,7);
    leafGeo.translate(0,2.5,0);
    const leafMat=new THREE.MeshLambertMaterial({color:0x2f7a2f,flatShading:true});
    const leafInst=new THREE.InstancedMesh(leafGeo,leafMat,COUNT);
    leafInst.castShadow=true;

    // also a darker variant: alternate colors via instanceColor
    leafInst.instanceColor=new THREE.InstancedBufferAttribute(new Float32Array(COUNT*3),3);

    const m=new THREE.Matrix4(),q=new THREE.Quaternion(),pos=new THREE.Vector3(),scl=new THREE.Vector3();
    const rng=mulberry32(31);
    let placed=0,attempts=0;
    while(placed<COUNT && attempts<COUNT*4){
      attempts++;
      // place mostly along the flight corridor but offset to the sides
      const x=(rng()-0.2)*TERRAIN_SIZE*0.8;
      const z=(rng()-0.5)*TERRAIN_SIZE*0.7;
      // keep a clear corridor along z=0 so the plane has a runway
      if(Math.abs(z)<8 && x<300) continue;
      // skip far cells if dist too big (terrain rises there)
      if(Math.hypot(x,z)>TERRAIN_SIZE*0.45) continue;
      // sample terrain height roughly (mirror buildTerrain formula)
      const h=Math.sin(x*0.04)*Math.cos(z*0.04)*1.4 + Math.sin(x*0.11+z*0.08)*0.6;
      const s=0.7+rng()*0.9;
      pos.set(x,h-0.05,z);
      scl.set(s,s*(0.85+rng()*0.4),s);
      q.setFromAxisAngle(new THREE.Vector3(0,1,0),rng()*Math.PI*2);
      m.compose(pos,q,scl);
      trunkInst.setMatrixAt(placed,m);
      leafInst.setMatrixAt(placed,m);
      // foliage tint: green spread
      const tg=0.30+rng()*0.30, tr=0.10+rng()*0.18, tb=0.10+rng()*0.16;
      leafInst.instanceColor.setXYZ(placed,tr+0.1,tg+0.3,tb+0.1);
      placed++;
    }
    trunkInst.count=placed;leafInst.count=placed;
    trunkInst.instanceMatrix.needsUpdate=true;leafInst.instanceMatrix.needsUpdate=true;
    leafInst.instanceColor.needsUpdate=true;
    scene.add(trunkInst);scene.add(leafInst);
  }
  scatterTrees();

  // Grass tufts (instanced billboards near the corridor)
  function scatterGrass(){
    const COUNT=400;
    const geo=new THREE.PlaneGeometry(0.5,0.6);
    geo.translate(0,0.3,0);
    const tex=buildCanvasTexture(64,64,c=>{
      c.strokeStyle='#3e8a35';c.lineWidth=2;c.lineCap='round';
      for(let i=0;i<5;i++){c.beginPath();const x=14+i*8+(Math.random()*4);c.moveTo(x,60);c.quadraticCurveTo(x+4,40+Math.random()*8,x+(Math.random()*4-2),20+Math.random()*8);c.stroke()}
    });
    const mat=new THREE.MeshBasicMaterial({map:tex,transparent:true,alphaTest:0.4,side:THREE.DoubleSide,depthWrite:false});
    const inst=new THREE.InstancedMesh(geo,mat,COUNT);
    const m=new THREE.Matrix4(),q=new THREE.Quaternion(),pos=new THREE.Vector3(),scl=new THREE.Vector3(1,1,1);
    const rng=mulberry32(91);
    let placed=0;
    for(let i=0;i<COUNT;i++){
      const x=(rng()-0.1)*600;
      const z=(rng()-0.5)*120;
      if(Math.abs(z)<2 && x<200) continue;
      const h=Math.sin(x*0.04)*Math.cos(z*0.04)*1.4 + Math.sin(x*0.11+z*0.08)*0.6;
      pos.set(x,h-0.05,z);
      const s=0.7+rng()*1.1;scl.set(s,s,s);
      q.setFromAxisAngle(new THREE.Vector3(0,1,0),rng()*Math.PI*2);
      m.compose(pos,q,scl);
      inst.setMatrixAt(placed++,m);
    }
    inst.count=placed;inst.instanceMatrix.needsUpdate=true;
    scene.add(inst);
  }
  scatterGrass();

  // ── Airplane ──────────────────────────────────────────────────────────
  const planeGroup=new THREE.Group();
  scene.add(planeGroup);

  function makeFuselage(){
    const g=new THREE.BoxGeometry(2.4,0.4,0.4);
    const m=new THREE.MeshLambertMaterial({color:0xf2eadf});
    const mesh=new THREE.Mesh(g,m);mesh.castShadow=true;
    const nose=new THREE.Mesh(new THREE.ConeGeometry(0.28,0.6,4),new THREE.MeshLambertMaterial({color:0xe8dec8}));
    nose.rotation.z=-Math.PI/2;nose.position.x=1.5;nose.castShadow=true;
    mesh.add(nose);
    return mesh;
  }
  function makeWing(side){
    const g=new THREE.BoxGeometry(1.0,0.06,1.6);
    const mesh=new THREE.Mesh(g,new THREE.MeshLambertMaterial({color:0xeae0cf}));
    mesh.castShadow=true;
    mesh.position.set(0,0.05,side*0.95);
    mesh.rotation.x=side*0.05;
    return mesh;
  }
  function makeTail(){
    const grp=new THREE.Group();
    const horiz=new THREE.Mesh(new THREE.BoxGeometry(0.6,0.04,0.7),new THREE.MeshLambertMaterial({color:0xeae0cf}));
    horiz.position.set(-1.05,0.1,0);horiz.castShadow=true;grp.add(horiz);
    const vert=new THREE.Mesh(new THREE.BoxGeometry(0.5,0.5,0.04),new THREE.MeshLambertMaterial({color:0xeae0cf}));
    vert.position.set(-1.05,0.32,0);vert.castShadow=true;grp.add(vert);
    return grp;
  }

  const fuselage=makeFuselage();planeGroup.add(fuselage);
  const wingL=makeWing(-1);planeGroup.add(wingL);
  const wingR=makeWing(+1);planeGroup.add(wingR);
  const tail=makeTail();planeGroup.add(tail);

  function applyPartsVisuals(p){wingL.visible=p.wing_l;wingR.visible=p.wing_r;tail.visible=p.tail}

  // ── Debris ────────────────────────────────────────────────────────────
  const FRAGMENT_COUNT=24;
  const debris=[];
  for(let i=0;i<FRAGMENT_COUNT;i++){
    const s=0.18+Math.random()*0.22;
    const m=new THREE.Mesh(new THREE.BoxGeometry(s,s*0.4,s*0.7),new THREE.MeshLambertMaterial({color:0xe8dec8,flatShading:true}));
    m.castShadow=true;m.visible=false;m.userData={vel:new THREE.Vector3(),angVel:new THREE.Vector3(),alive:0};
    scene.add(m);debris.push(m);
  }
  function spawnDebris(origin){
    for(const d of debris){
      d.position.copy(origin).add(new THREE.Vector3((Math.random()-.5)*0.6,(Math.random())*0.4,(Math.random()-.5)*0.6));
      d.rotation.set(Math.random()*Math.PI,Math.random()*Math.PI,Math.random()*Math.PI);
      const sp=4+Math.random()*4;
      d.userData.vel.set((Math.random()-.5)*sp,Math.random()*sp*0.8+1,(Math.random()-.5)*sp);
      d.userData.angVel.set((Math.random()-.5)*8,(Math.random()-.5)*8,(Math.random()-.5)*8);
      d.userData.alive=2.0;d.visible=true;
    }
  }
  function stepDebris(dt){
    for(const d of debris){
      if(!d.visible)continue;
      d.userData.alive-=dt;
      if(d.userData.alive<=0){d.visible=false;continue}
      d.userData.vel.y-=22*dt;
      d.position.addScaledVector(d.userData.vel,dt);
      if(d.position.y<0.05){d.position.y=0.05;d.userData.vel.y*=-0.3;d.userData.vel.x*=0.7;d.userData.vel.z*=0.7}
      d.rotation.x+=d.userData.angVel.x*dt;d.rotation.y+=d.userData.angVel.y*dt;d.rotation.z+=d.userData.angVel.z*dt;
    }
  }

  // ── Aerodynamic glide model ───────────────────────────────────────────
  // 2D physics in the X–Y plane (forward + up). Z handled separately for roll/yaw.
  // Forces:
  //   gravity: vy -= g * dt
  //   drag:    parallel to -velocity, magnitude k_d * speed²
  //   lift:    perpendicular to velocity, magnitude k_l * speed² × wing_count
  // With proper coefs the plane glides instead of climbing.
  const PHYS={
    gravity:9.8,
    drag_coef:0.0040,           // small constant drag
    lift_coef_per_wing:0.0085,  // each wing contributes lift
    asymmetric_roll:1.6,
    pitch_align_with_tail:6.0,  // how fast pitch tracks velocity vector when tailed
    pitch_align_no_tail:0.8,
    max_throw_speed:34,
    min_throw_speed:8,
    z_drift_per_dt:0.0,         // could add wind later
  };

  const state={
    parts:{fuselage:true,wing_l:false,wing_r:false,tail:false},
    attempt:1,best:0,distance:0,
    phase:'aiming',  // aiming | flying | crashed
    vel:new THREE.Vector3(),
    rotVel:new THREE.Vector3(),
  };

  function resetPlane(){
    planeGroup.position.set(0,3.5,0);
    planeGroup.rotation.set(0,0,0);
    state.vel.set(0,0,0);state.rotVel.set(0,0,0);
    applyPartsVisuals(state.parts);
  }
  resetPlane();

  function launch(speedX,speedY){
    state.phase='flying';
    state.distance=0;
    state.vel.set(speedX,speedY,0);
    state.rotVel.set(0,0,0);
    planeGroup.rotation.set(0,0,Math.atan2(speedY,speedX));
    hideToast();hideHint();
  }

  function crash(){
    state.phase='crashed';
    spawnDebris(planeGroup.position);
    planeGroup.visible=false;
    if(state.distance>state.best)state.best=state.distance;
    showToast(verdict());
    state.attempt++;
    setTimeout(()=>{
      planeGroup.visible=true;
      resetPlane();
      state.phase='aiming';
      state.distance=0;
      updateHud();
      showHint();
    },1400);
  }

  function verdict(){
    const p=state.parts;
    if(!p.wing_l && !p.wing_r) return {h:'No lift!',s:'Add at least one wing.'};
    if(p.wing_l !== p.wing_r) return {h:'Asymmetric!',s:'Add the matching wing.'};
    if(!p.tail) return {h:'Unstable',s:'Add a tail to stabilize pitch.'};
    if(state.distance>=state.best && state.best>0) return {h:'New record!',s:`${Math.round(state.distance)} m`};
    return {h:'Crashed',s:`${Math.round(state.distance)} m. Try again.`};
  }

  function step(dt){
    if(state.phase!=='flying') return;
    const p=state.parts;
    const wings=(p.wing_l?1:0)+(p.wing_r?1:0);

    // 2D vector in X-Y (forward, up)
    const vx=state.vel.x,vy=state.vel.y;
    const speed=Math.hypot(vx,vy);

    if(speed>0.01){
      const dirX=vx/speed,dirY=vy/speed;
      // perpendicular pointing "up-ish" relative to motion (rotate dir 90deg CCW)
      const perpX=-dirY,perpY=dirX;
      const speed2=speed*speed;

      // drag: opposite to motion
      const dragMag=PHYS.drag_coef*speed2;
      state.vel.x-=dirX*dragMag*dt;
      state.vel.y-=dirY*dragMag*dt;

      // lift: perpendicular, scaled by wing_count
      const liftMag=wings*PHYS.lift_coef_per_wing*speed2;
      state.vel.x+=perpX*liftMag*dt;
      state.vel.y+=perpY*liftMag*dt;
    }

    // gravity
    state.vel.y-=PHYS.gravity*dt;

    // pitch: align fuselage with velocity vector (rotation around Z = pitch)
    const targetPitch=Math.atan2(state.vel.y,Math.max(state.vel.x,0.01));
    const align=p.tail?PHYS.pitch_align_with_tail:PHYS.pitch_align_no_tail;
    planeGroup.rotation.z=lerp(planeGroup.rotation.z,targetPitch,1-Math.pow(0.001,dt*align/6));

    // roll: asymmetric wings cause rotation around X
    if(p.wing_l !== p.wing_r){
      const dir=p.wing_l?1:-1;
      state.rotVel.x+=dir*PHYS.asymmetric_roll*dt;
    }
    planeGroup.rotation.x+=state.rotVel.x*dt;
    planeGroup.rotation.x=clamp(planeGroup.rotation.x,-1.6,1.6);

    // yaw drift if rolling badly
    if(Math.abs(planeGroup.rotation.x)>0.5){
      state.vel.z+=Math.sin(planeGroup.rotation.x)*4*dt;
    }

    // integrate position
    planeGroup.position.addScaledVector(state.vel,dt);
    state.distance=Math.max(state.distance,planeGroup.position.x);

    // crash conditions
    if(planeGroup.position.y<=0.4){crash();return}
    if(Math.abs(planeGroup.rotation.x)>1.4){crash();return}
    if(state.vel.x<-2 && planeGroup.position.x<state.distance-3){crash();return}
  }

  // ── Camera (chase from directly behind, slightly above) ───────────────
  const camPos=new THREE.Vector3();
  const camTarget=new THREE.Vector3();
  function followCamera(dt){
    // behind = -X relative to plane (plane flies +X). slightly above + slight z follow.
    const ideal=new THREE.Vector3(planeGroup.position.x-11,planeGroup.position.y+3.5,planeGroup.position.z);
    if(state.phase==='aiming'){
      // closer, lower angle when aiming
      ideal.set(planeGroup.position.x-9,planeGroup.position.y+2.5,planeGroup.position.z);
    }
    if(camPos.lengthSq()===0)camPos.copy(ideal);
    else camPos.lerp(ideal,1-Math.pow(0.001,dt*1.4));
    camera.position.copy(camPos);
    camTarget.lerp(planeGroup.position,1-Math.pow(0.001,dt*2.0));
    if(state.phase==='aiming')camTarget.copy(planeGroup.position);
    camera.lookAt(camTarget);
  }

  // ── HUD ───────────────────────────────────────────────────────────────
  const $=(s)=>document.querySelector(s);
  const elAtt=$('#att-num'),elDist=$('#distance'),elBest=$('#best'),elToast=$('#toast'),elTH=$('#toast-h'),elTS=$('#toast-s'),elHint=$('#hint');
  function updateHud(){elAtt.textContent=state.attempt;elDist.textContent=Math.round(state.distance)+' m';elBest.textContent='best '+Math.round(state.best)+' m'}
  function showToast(v){elTH.textContent=v.h;elTS.textContent=v.s;elToast.classList.add('show');setTimeout(()=>elToast.classList.remove('show'),1300)}
  function hideToast(){elToast.classList.remove('show')}
  function showHint(){elHint.classList.remove('hidden')}
  function hideHint(){elHint.classList.add('hidden')}

  for(const el of document.querySelectorAll('.part:not(.locked)')){
    el.addEventListener('click',(e)=>{e.stopPropagation();if(state.phase==='flying')return;const id=el.dataset.id;state.parts[id]=!state.parts[id];el.classList.toggle('on',state.parts[id]);applyPartsVisuals(state.parts)});
  }
  for(const el of document.querySelectorAll('.part')){const id=el.dataset.id;el.classList.toggle('on',!!state.parts[id])}

  // ── Drag-and-release input ────────────────────────────────────────────
  // Drag anywhere on the canvas — the further you drag back, the harder the throw.
  // Direction of throw = inverse of drag vector projected to (forward, up) plane.
  const dragLine=document.getElementById('drag-line');
  const dragEnd=document.getElementById('drag-end');
  let drag=null;

  function onPointerDown(e){
    if(state.phase!=='aiming')return;
    if(e.target.closest('.part'))return;
    canvas.setPointerCapture(e.pointerId);
    drag={startX:e.clientX,startY:e.clientY,curX:e.clientX,curY:e.clientY};
    updateDragVis();
  }
  function onPointerMove(e){
    if(!drag)return;
    drag.curX=e.clientX;drag.curY=e.clientY;
    updateDragVis();
  }
  function onPointerUp(e){
    if(!drag)return;
    const dx=drag.curX-drag.startX, dy=drag.curY-drag.startY;
    const px=Math.hypot(dx,dy);
    drag=null;clearDragVis();
    if(px<24){return} // too small, ignore
    // Power: 0..1 from 24px to 240px
    const power=clamp((px-24)/(240-24),0,1);
    const speed=lerp(PHYS.min_throw_speed,PHYS.max_throw_speed,power);
    // Direction: drag down-back means throw up-forward. Map screen vector to world:
    //   screen +X (right)  → -world X (because drag right means launch left? we want opposite of drag)
    //   screen +Y (down)   → +world Y (drag down means up)
    // Actually: simpler — invert drag, then map screen-space angle to a launch angle.
    // We want forward speed always positive (plane goes +X).
    // The vertical component of drag controls launch angle (-25° to +35°).
    const upPx=-dy;  // positive = dragged up (we want low angle)
    const verticalRatio=clamp(-upPx/px,-1,1);  // dragged down => +verticalRatio => launch up
    const angle=lerp(-0.25,0.65,(verticalRatio+1)/2);  // -14° to +37°
    const sx=speed*Math.cos(angle), sy=speed*Math.sin(angle);
    launch(sx,sy);
  }
  function updateDragVis(){
    if(!drag)return;
    dragLine.setAttribute('x1',drag.startX);dragLine.setAttribute('y1',drag.startY);
    dragLine.setAttribute('x2',drag.curX);dragLine.setAttribute('y2',drag.curY);
    dragLine.setAttribute('opacity','0.85');
    dragEnd.setAttribute('cx',drag.curX);dragEnd.setAttribute('cy',drag.curY);
    dragEnd.setAttribute('opacity','0.95');
  }
  function clearDragVis(){
    dragLine.setAttribute('opacity','0');dragEnd.setAttribute('opacity','0');
  }
  canvas.addEventListener('pointerdown',onPointerDown);
  canvas.addEventListener('pointermove',onPointerMove);
  canvas.addEventListener('pointerup',onPointerUp);
  canvas.addEventListener('pointercancel',onPointerUp);

  // ── Loop ──────────────────────────────────────────────────────────────
  let last=performance.now();
  function frame(t){
    const dt=Math.min(0.05,(t-last)/1000);last=t;
    step(dt);
    stepDebris(dt);
    followCamera(dt);
    if(state.phase==='flying')updateHud();
    renderer.render(scene,camera);
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
