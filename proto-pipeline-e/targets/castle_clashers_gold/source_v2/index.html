<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Castle Clashers — v2 (promax)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main id="stage" aria-label="Castle Clashers playable">
      <canvas id="game" width="360" height="640"></canvas>
      <div id="pull-hint" class="hidden">PULL BACK<br>TO SHOOT</div>
      <div id="download-cta" role="button" tabindex="0" aria-label="Download Castle Busters">
        <div class="top">DOWNLOAD</div>
        <div class="bot">CASTLE BUSTERS</div>
      </div>
      <div id="tuning-panel">
        <button id="tuning-toggle" type="button">TUNE ▾</button>
        <div id="tuning-body">
          <div class="tuning-section">
            <div class="tuning-title">Player positions</div>
            <label>P1 X <output id="t-p0-x-out">214</output>
              <input id="t-p0-x" type="range" min="0" max="740" step="1" value="214" />
            </label>
            <label>P1 Y <output id="t-p0-y-out">271</output>
              <input id="t-p0-y" type="range" min="0" max="640" step="1" value="271" />
            </label>
            <label>P2 X <output id="t-p1-x-out">158</output>
              <input id="t-p1-x" type="range" min="0" max="740" step="1" value="158" />
            </label>
            <label>P2 Y <output id="t-p1-y-out">348</output>
              <input id="t-p1-y" type="range" min="0" max="640" step="1" value="348" />
            </label>
            <label>P3 X <output id="t-p2-x-out">102</output>
              <input id="t-p2-x" type="range" min="0" max="740" step="1" value="102" />
            </label>
            <label>P3 Y <output id="t-p2-y-out">380</output>
              <input id="t-p2-y" type="range" min="0" max="640" step="1" value="380" />
            </label>
          </div>
          <div class="tuning-section">
            <div class="tuning-title">Enemy positions</div>
            <label>E1 X <output id="t-e0-x-out">533</output>
              <input id="t-e0-x" type="range" min="0" max="740" step="1" value="533" />
            </label>
            <label>E1 Y <output id="t-e0-y-out">277</output>
              <input id="t-e0-y" type="range" min="0" max="640" step="1" value="277" />
            </label>
            <label>E2 X <output id="t-e1-x-out">563</output>
              <input id="t-e1-x" type="range" min="0" max="740" step="1" value="563" />
            </label>
            <label>E2 Y <output id="t-e1-y-out">376</output>
              <input id="t-e1-y" type="range" min="0" max="640" step="1" value="376" />
            </label>
            <label>E3 X <output id="t-e2-x-out">630</output>
              <input id="t-e2-x" type="range" min="0" max="740" step="1" value="630" />
            </label>
            <label>E3 Y <output id="t-e2-y-out">455</output>
              <input id="t-e2-y" type="range" min="0" max="640" step="1" value="455" />
            </label>
          </div>
        </div>
      </div>
    </main>
    <script>
      window.CC_ASSET_MANIFEST_URL = "./assets.json";
    </script>
    <!-- Bank utilities -->
    <script src="../../../../utils/vfx/particles.js"></script>
    <script src="../../../../utils/vfx/smoke.js"></script>
    <script src="../../../../utils/vfx/burst.js"></script>
    <script src="../../../../utils/vfx/trail.js"></script>
    <script src="../../../../utils/vfx/shake.js"></script>
    <script src="../../../../utils/vfx/float-text.js"></script>
    <script src="../../../../utils/vfx/debris.js"></script>
    <script src="../../../../utils/vfx/section-destroy.js"></script>
    <script src="../../../../utils/hud/vs-bar-top.js"></script>
    <script src="../../../../utils/end-screens/game-lost.js"></script>
    <script src="../../../../utils/end-screens/game-won.js"></script>
    <script src="../../../../utils/end-screens/win-effect.js"></script>
    <script src="../../../../utils/end-screens/game-over-effect.js"></script>
    <script src="../../../../utils/mechanics/cta-trigger.js"></script>
    <script src="../../../../utils/mechanics/audio.js"></script>
    <script src="../../../../utils/mechanics/haptics.js"></script>
    <script src="../../../../utils/mechanics/tutorial-hand.js"></script>
    <script>
      // Override the synth-bassline startMusic/stopMusic with an actual track.
      (function () {
        const MUSIC_SRC = "../../../../ressources/Castle Clashers/Assets/Music.ogg";
        const el = new Audio(MUSIC_SRC);
        el.loop = true;
        el.volume = 0.35;
        el.preload = "auto";
        let started = false;
        window.startMusic = function () {
          if (started) return;
          started = true;
          const p = el.play();
          if (p && typeof p.catch === "function") p.catch(() => { started = false; });
        };
        window.stopMusic = function () {
          started = false;
          try { el.pause(); el.currentTime = 0; } catch (e) {}
        };
        window.setMusicVolume = function (v) {
          el.volume = Math.max(0, Math.min(1, v));
        };
      })();
    </script>
    <script src="./game.js"></script>
  </body>
</html>
